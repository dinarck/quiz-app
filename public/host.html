<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Host Dashboard - Quiz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.4/build/qrcode.min.js"></script>
</head>
<body>

  <!-- Login screen -->
  <div class="center-page" id="loginScreen">
    <div class="card">
      <div class="app-title">Quiz Host</div>
      <div class="app-subtitle">Sign in to manage your quiz</div>
      <div id="loginError" class="alert alert-error hidden"></div>
      <form id="loginForm">
        <label for="passwordInput">Host Password</label>
        <input type="password" id="passwordInput" placeholder="Enter host password" required>
        <button type="submit" class="btn btn-primary btn-block btn-lg mt-24">Sign In</button>
      </form>
    </div>
  </div>

  <!-- Dashboard -->
  <div class="host-container hidden" id="dashboard">
    <!-- Header -->
    <div class="host-header">
      <div>
        <div class="app-title" style="text-align:left;font-size:24px;margin:0">Quiz Host Dashboard</div>
        <div class="text-muted" id="statusText">Loading...</div>
      </div>
      <div class="flex gap-8 flex-wrap">
        <button class="btn btn-outline btn-sm" onclick="resetQuiz()">Reset Responses</button>
        <button class="btn btn-danger btn-sm" onclick="resetAll()">Reset Everything</button>
        <button class="btn btn-outline btn-sm" onclick="logout()">Logout</button>
      </div>
    </div>

    <!-- QR + Link -->
    <div class="qr-section" id="qrSection">
      <canvas id="qrCanvas"></canvas>
      <div class="qr-info">
        <div class="qr-link" id="joinLink"></div>
        <div class="qr-hint">Share this link or scan the QR code to join the quiz</div>
        <button class="btn btn-sm btn-outline mt-8" onclick="copyLink()">Copy Link</button>
      </div>
    </div>

    <!-- Stats row -->
    <div class="stats-row" id="statsRow">
      <div class="stat-card">
        <div class="stat-value" id="statParticipants">0</div>
        <div class="stat-label">Participants</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="statQuestions">0</div>
        <div class="stat-label">Questions</div>
      </div>
      <div class="stat-card">
        <div class="stat-value success" id="statActive">0</div>
        <div class="stat-label">Active Questions</div>
      </div>
    </div>

    <!-- Main grid -->
    <div class="host-grid">
      <!-- Left: Question management -->
      <div class="panel">
        <h2>Questions</h2>

        <!-- Add question form -->
        <div class="add-question-box">
          <input type="text" id="newQuestionInput" placeholder="Type a new question...">
          <div class="options-grid mt-8">
            <div class="option-input-row">
              <span class="option-label opt-a-badge">A</span>
              <input type="text" id="optionA" placeholder="Answer for option A">
            </div>
            <div class="option-input-row">
              <span class="option-label opt-b-badge">B</span>
              <input type="text" id="optionB" placeholder="Answer for option B">
            </div>
            <div class="option-input-row">
              <span class="option-label opt-c-badge">C</span>
              <input type="text" id="optionC" placeholder="Answer for option C">
            </div>
            <div class="option-input-row">
              <span class="option-label opt-d-badge">D</span>
              <input type="text" id="optionD" placeholder="Answer for option D">
            </div>
          </div>
          <div class="image-upload-row mt-8">
            <label class="btn btn-outline btn-sm upload-label" for="imageInput">
              &#128247; Attach Image
            </label>
            <input type="file" id="imageInput" accept="image/*" style="display:none" onchange="previewImage(this)">
            <span class="text-muted" id="imageFileName">No image selected</span>
            <button class="btn btn-sm btn-outline hidden" id="clearImageBtn" onclick="clearImage()" style="padding:4px 10px">&#10005;</button>
          </div>
          <div id="imagePreview" class="image-preview hidden">
            <img id="previewImg" src="" alt="Preview">
          </div>
          <button class="btn btn-primary btn-block mt-8" onclick="addQuestion()">Add Question</button>
        </div>

        <!-- Activate control -->
        <div class="activate-bar mt-16" id="activateBar">
          <div class="info">
            Active up to: <strong>Question <span id="activeUpTo">0</span></strong>
            of <span id="totalQuestions">0</span>
          </div>
          <button class="btn btn-success btn-sm" id="activateNextBtn" onclick="activateNext()">
            Activate Next
          </button>
        </div>

        <div id="questionList"></div>
      </div>

      <!-- Right: Live stats -->
      <div class="panel">
        <h2>Live Results</h2>
        <div id="resultsList"></div>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    let hostToken = localStorage.getItem('host_token');
    let stats = null;
    let pendingImageData = null;

    const socket = io();

    // ── Login ──────────────────────────────────────────────────

    if (hostToken) {
      void showDashboard();
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errEl = document.getElementById('loginError');
      errEl.classList.add('hidden');
      const password = document.getElementById('passwordInput').value;

      try {
        const res = await fetch('/api/host/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);
        hostToken = data.token;
        localStorage.setItem('host_token', hostToken);
        await showDashboard();
      } catch (err) {
        errEl.textContent = err.message;
        errEl.classList.remove('hidden');
      }
    });

    async function showDashboard() {
      document.getElementById('loginScreen').classList.add('hidden');
      document.getElementById('dashboard').classList.remove('hidden');
      socket.emit('join-host');
      await loadDashboard();
      try {
        generateQR();
      } catch (e) {
        console.error('QR code failed (dashboard data still loaded)', e);
      }
    }

    function logout() {
      localStorage.removeItem('host_token');
      window.location.reload();
    }

    // ── QR Code ────────────────────────────────────────────────

    function generateQR() {
      const joinUrl = window.location.origin + '/';
      document.getElementById('joinLink').textContent = joinUrl;
      if (typeof QRCode === 'undefined') {
        console.warn('QRCode library not loaded; join link is still shown above.');
        return;
      }
      const canvas = document.getElementById('qrCanvas');
      QRCode.toCanvas(canvas, joinUrl, { width: 120, margin: 1 }, (err) => {
        if (err) console.error('QR error', err);
      });
    }

    function copyLink() {
      const url = window.location.origin + '/';
      navigator.clipboard.writeText(url).then(() => {
        const btn = event.target;
        btn.textContent = 'Copied!';
        setTimeout(() => btn.textContent = 'Copy Link', 1500);
      });
    }

    // ── Image upload ────────────────────────────────────────────

    function previewImage(input) {
      const file = input.files[0];
      if (!file) return;
      if (file.size > 5 * 1024 * 1024) {
        alert('Image must be under 5MB');
        input.value = '';
        return;
      }
      document.getElementById('imageFileName').textContent = file.name;
      document.getElementById('clearImageBtn').classList.remove('hidden');

      const reader = new FileReader();
      reader.onload = (e) => {
        pendingImageData = e.target.result;
        document.getElementById('previewImg').src = pendingImageData;
        document.getElementById('imagePreview').classList.remove('hidden');
      };
      reader.readAsDataURL(file);
    }

    function clearImage() {
      pendingImageData = null;
      document.getElementById('imageInput').value = '';
      document.getElementById('imageFileName').textContent = 'No image selected';
      document.getElementById('clearImageBtn').classList.add('hidden');
      document.getElementById('imagePreview').classList.add('hidden');
    }

    // ── Load data ──────────────────────────────────────────────

    async function loadDashboard() {
      try {
        const res = await fetch('/api/host/dashboard', {
          headers: { 'x-host-token': hostToken },
        });
        if (res.status === 401) { logout(); return; }
        const ct = res.headers.get('content-type') || '';
        if (!ct.includes('application/json')) {
          console.error('Dashboard response was not JSON', res.status);
          return;
        }
        const data = await res.json();
        if (!data || !Array.isArray(data.questions)) {
          console.error('Invalid dashboard payload', data);
          return;
        }
        stats = data;
        renderDashboard();
      } catch (e) {
        console.error('Failed to load dashboard', e);
      }
    }

    // ── Render ─────────────────────────────────────────────────

    function renderDashboard() {
      if (!stats) return;

      document.getElementById('statParticipants').textContent = stats.participantCount;
      document.getElementById('statQuestions').textContent = stats.questions.length;
      document.getElementById('statActive').textContent = stats.activeQuestionOrder;
      document.getElementById('activeUpTo').textContent = stats.activeQuestionOrder;
      document.getElementById('totalQuestions').textContent = stats.questions.length;
      document.getElementById('statusText').textContent =
        `${stats.participantCount} participants connected  ·  ${stats.activeQuestionOrder} of ${stats.questions.length} questions active`;

      const canActivate = stats.activeQuestionOrder < stats.questions.length;
      document.getElementById('activateNextBtn').disabled = !canActivate;

      renderQuestionList();
      renderResults();
    }

    function renderQuestionList() {
      const list = document.getElementById('questionList');
      if (stats.questions.length === 0) {
        list.innerHTML = '<div class="text-muted text-center" style="padding:24px">No questions yet. Add one above.</div>';
        return;
      }

      const emptyStats = { A: 0, B: 0, C: 0, D: 0, total: 0, majority: 'None' };
      list.innerHTML = stats.questions.map((q) => {
        const s = q.stats || emptyStats;
        const isActive = q.order_num <= stats.activeQuestionOrder;
        const cls = isActive ? 'active' : (stats.activeQuestionOrder > 0 ? 'inactive' : '');
        const imgIcon = q.has_image ? ' &#128247;' : '';
        const opts = parseOptions(q.options);
        return `
          <div class="question-item-wrap ${cls}" data-id="${q.id}">
            <div class="question-item-header">
              <div class="q-number">${q.order_num}</div>
              <div class="q-text">${escapeHtml(q.text)}${imgIcon}</div>
              <div class="q-stats">
                <span class="q-opt-a" title="${escapeHtml(opts.A)}">${s.A}</span>
                <span class="q-opt-b" title="${escapeHtml(opts.B)}">${s.B}</span>
                <span class="q-opt-c" title="${escapeHtml(opts.C)}">${s.C}</span>
                <span class="q-opt-d" title="${escapeHtml(opts.D)}">${s.D}</span>
              </div>
              <div class="q-actions">
                <button title="Move up" onclick="moveQuestion(${q.id}, -1)">&#9650;</button>
                <button title="Move down" onclick="moveQuestion(${q.id}, 1)">&#9660;</button>
                <button title="Delete" onclick="deleteQuestion(${q.id})">&#10005;</button>
              </div>
            </div>
            <div class="q-options-preview">
              <span class="q-opt-tag q-opt-a">A: ${escapeHtml(opts.A)}</span>
              <span class="q-opt-tag q-opt-b">B: ${escapeHtml(opts.B)}</span>
              <span class="q-opt-tag q-opt-c">C: ${escapeHtml(opts.C)}</span>
              <span class="q-opt-tag q-opt-d">D: ${escapeHtml(opts.D)}</span>
            </div>
          </div>`;
      }).join('');
    }

    function renderResults() {
      const container = document.getElementById('resultsList');
      const activeQs = stats.questions.filter(q => q.order_num <= stats.activeQuestionOrder);

      if (activeQs.length === 0) {
        container.innerHTML = '<div class="text-muted text-center" style="padding:24px">Activate questions to see results here.</div>';
        return;
      }

      const optColors = { A: 'opt-a', B: 'opt-b', C: 'opt-c', D: 'opt-d' };

      const emptyStats = { A: 0, B: 0, C: 0, D: 0, total: 0, majority: 'None' };
      container.innerHTML = activeQs.map(q => {
        const s = q.stats || emptyStats;
        const opts = parseOptions(q.options);
        const total = s.total || 1;
        const pctA = Math.round((s.A / total) * 100);
        const pctB = Math.round((s.B / total) * 100);
        const pctC = Math.round((s.C / total) * 100);
        const pctD = Math.round((s.D / total) * 100);

        let majorityLabel = s.majority;
        let majorityClass = 'tie-majority';
        if (['A','B','C','D'].includes(s.majority)) {
          majorityClass = s.majority.toLowerCase() + '-majority';
          majorityLabel = opts[s.majority];
        }

        return `
          <div style="margin-bottom:20px;padding:16px;border:1px solid var(--border);border-radius:var(--radius-sm)">
            <div class="flex justify-between items-center mb-8">
              <strong style="font-size:14px">Q${q.order_num}: ${escapeHtml(q.text)}</strong>
              <span class="q-majority ${majorityClass}">${escapeHtml(majorityLabel)}</span>
            </div>
            <div class="stats-row" style="margin-bottom:8px">
              <div class="stat-card" style="padding:10px">
                <div class="stat-value opt-a-color" style="font-size:22px">${s.A}</div>
                <div class="stat-label">${escapeHtml(opts.A)} (${s.total > 0 ? pctA : 0}%)</div>
              </div>
              <div class="stat-card" style="padding:10px">
                <div class="stat-value opt-b-color" style="font-size:22px">${s.B}</div>
                <div class="stat-label">${escapeHtml(opts.B)} (${s.total > 0 ? pctB : 0}%)</div>
              </div>
              <div class="stat-card" style="padding:10px">
                <div class="stat-value opt-c-color" style="font-size:22px">${s.C}</div>
                <div class="stat-label">${escapeHtml(opts.C)} (${s.total > 0 ? pctC : 0}%)</div>
              </div>
              <div class="stat-card" style="padding:10px">
                <div class="stat-value opt-d-color" style="font-size:22px">${s.D}</div>
                <div class="stat-label">${escapeHtml(opts.D)} (${s.total > 0 ? pctD : 0}%)</div>
              </div>
            </div>
            <div class="stat-card" style="padding:8px;text-align:center">
              <span style="font-size:13px;color:var(--text-secondary)">${s.total} answered · ${stats.participantCount - s.total} pending</span>
            </div>
            <div style="display:flex;height:8px;border-radius:4px;overflow:hidden;background:var(--border);margin-top:8px">
              <div style="width:${s.total > 0 ? pctA : 0}%;background:var(--opt-a);transition:width .3s"></div>
              <div style="width:${s.total > 0 ? pctB : 0}%;background:var(--opt-b);transition:width .3s"></div>
              <div style="width:${s.total > 0 ? pctC : 0}%;background:var(--opt-c);transition:width .3s"></div>
              <div style="width:${s.total > 0 ? pctD : 0}%;background:var(--opt-d);transition:width .3s"></div>
            </div>
          </div>`;
      }).join('');
    }

    // ── Actions ────────────────────────────────────────────────

    async function addQuestion() {
      const input = document.getElementById('newQuestionInput');
      const text = input.value.trim();
      if (!text) return;

      const optA = document.getElementById('optionA').value.trim();
      const optB = document.getElementById('optionB').value.trim();
      const optC = document.getElementById('optionC').value.trim();
      const optD = document.getElementById('optionD').value.trim();

      if (!optA || !optB || !optC || !optD) {
        alert('Please fill in all four answer options.');
        return;
      }

      const body = { text, options: { A: optA, B: optB, C: optC, D: optD } };
      if (pendingImageData) body.imageData = pendingImageData;

      const result = await apiFetch('/api/host/questions', 'POST', body);
      if (result) {
        input.value = '';
        document.getElementById('optionA').value = '';
        document.getElementById('optionB').value = '';
        document.getElementById('optionC').value = '';
        document.getElementById('optionD').value = '';
        clearImage();
      }
    }

    async function deleteQuestion(id) {
      if (!confirm('Delete this question and its responses?')) return;
      await apiFetch(`/api/host/questions/${id}`, 'DELETE');
    }

    async function moveQuestion(id, direction) {
      const ids = stats.questions.map(q => q.id);
      const idx = ids.indexOf(id);
      const newIdx = idx + direction;
      if (newIdx < 0 || newIdx >= ids.length) return;
      [ids[idx], ids[newIdx]] = [ids[newIdx], ids[idx]];
      await apiFetch('/api/host/questions/reorder', 'POST', { questionIds: ids });
    }

    async function activateNext() {
      const next = stats.activeQuestionOrder + 1;
      if (next > stats.questions.length) return;
      await apiFetch('/api/host/activate', 'POST', { orderNum: next });
    }

    async function resetQuiz() {
      if (!confirm('This will clear all participant responses and logins. Questions will be kept. Continue?')) return;
      await apiFetch('/api/host/reset', 'POST');
    }

    async function resetAll() {
      if (!confirm('This will delete ALL data — questions, responses, and participants. Continue?')) return;
      await apiFetch('/api/host/reset-all', 'POST');
    }

    async function apiFetch(url, method = 'GET', body = null) {
      const opts = {
        method,
        headers: { 'Content-Type': 'application/json', 'x-host-token': hostToken },
      };
      if (body) opts.body = JSON.stringify(body);
      try {
        const res = await fetch(url, opts);
        if (res.status === 401) { logout(); return; }
        return await res.json();
      } catch (e) {
        console.error('API error', e);
      }
    }

    document.getElementById('newQuestionInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); addQuestion(); }
    });

    // ── Real-time updates ──────────────────────────────────────

    socket.on('stats-update', (data) => {
      if (data && Array.isArray(data.questions)) {
        stats = data;
        renderDashboard();
      }
    });

    socket.on('connect', () => {
      if (!localStorage.getItem('host_token')) return;
      if (!document.getElementById('dashboard')?.classList.contains('hidden')) {
        socket.emit('join-host');
        void loadDashboard();
      }
    });

    // ── Util ───────────────────────────────────────────────────

    function parseOptions(raw) {
      const fallback = { A: 'Option A', B: 'Option B', C: 'Option C', D: 'Option D' };
      if (!raw) return fallback;
      try {
        return typeof raw === 'string' ? JSON.parse(raw) : raw;
      } catch (e) {
        return fallback;
      }
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }
  </script>
</body>
</html>
