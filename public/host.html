<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Host Dashboard - Quiz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.4/build/qrcode.min.js"></script>
</head>
<body>

  <!-- Login screen -->
  <div class="center-page" id="loginScreen">
    <div class="card">
      <div class="app-title">Quiz Host</div>
      <div class="app-subtitle">Sign in to manage your quiz</div>
      <div id="loginError" class="alert alert-error hidden"></div>
      <form id="loginForm">
        <label for="passwordInput">Host Password</label>
        <input type="password" id="passwordInput" placeholder="Enter host password" required>
        <button type="submit" class="btn btn-primary btn-block btn-lg mt-24">Sign In</button>
      </form>
    </div>
  </div>

  <!-- Dashboard -->
  <div class="host-container hidden" id="dashboard">
    <!-- Header -->
    <div class="host-header">
      <div>
        <div class="app-title" style="text-align:left;font-size:24px;margin:0">Quiz Host Dashboard</div>
        <div class="text-muted" id="statusText">Loading...</div>
      </div>
      <div class="flex gap-8 flex-wrap">
        <button class="btn btn-outline btn-sm" onclick="resetQuiz()">Reset Responses</button>
        <button class="btn btn-danger btn-sm" onclick="resetAll()">Reset Everything</button>
        <button class="btn btn-outline btn-sm" onclick="logout()">Logout</button>
      </div>
    </div>

    <!-- QR + Link -->
    <div class="qr-section" id="qrSection">
      <canvas id="qrCanvas"></canvas>
      <div class="qr-info">
        <div class="qr-link" id="joinLink"></div>
        <div class="qr-hint">Share this link or scan the QR code to join the quiz</div>
        <button class="btn btn-sm btn-outline mt-8" onclick="copyLink()">Copy Link</button>
      </div>
    </div>

    <!-- Stats row -->
    <div class="stats-row" id="statsRow">
      <div class="stat-card">
        <div class="stat-value" id="statParticipants">0</div>
        <div class="stat-label">Participants</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="statQuestions">0</div>
        <div class="stat-label">Questions</div>
      </div>
      <div class="stat-card">
        <div class="stat-value success" id="statActive">0</div>
        <div class="stat-label">Active Questions</div>
      </div>
    </div>

    <!-- Main grid -->
    <div class="host-grid">
      <!-- Left: Question management -->
      <div class="panel">
        <h2>Questions</h2>

        <div class="add-question-form">
          <input type="text" id="newQuestionInput" placeholder="Type a new question...">
          <button class="btn btn-primary btn-sm" onclick="addQuestion()">Add</button>
        </div>

        <!-- Activate control -->
        <div class="activate-bar" id="activateBar">
          <div class="info">
            Active up to: <strong>Question <span id="activeUpTo">0</span></strong>
            of <span id="totalQuestions">0</span>
          </div>
          <button class="btn btn-success btn-sm" id="activateNextBtn" onclick="activateNext()">
            Activate Next
          </button>
        </div>

        <div id="questionList"></div>
      </div>

      <!-- Right: Live stats -->
      <div class="panel">
        <h2>Live Results</h2>
        <div id="resultsList"></div>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    let hostToken = localStorage.getItem('host_token');
    let stats = null;

    const socket = io();

    // ── Login ──────────────────────────────────────────────────

    if (hostToken) {
      showDashboard();
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errEl = document.getElementById('loginError');
      errEl.classList.add('hidden');
      const password = document.getElementById('passwordInput').value;

      try {
        const res = await fetch('/api/host/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);
        hostToken = data.token;
        localStorage.setItem('host_token', hostToken);
        showDashboard();
      } catch (err) {
        errEl.textContent = err.message;
        errEl.classList.remove('hidden');
      }
    });

    function showDashboard() {
      document.getElementById('loginScreen').classList.add('hidden');
      document.getElementById('dashboard').classList.remove('hidden');
      socket.emit('join-host');
      generateQR();
      loadDashboard();
    }

    function logout() {
      localStorage.removeItem('host_token');
      window.location.reload();
    }

    // ── QR Code ────────────────────────────────────────────────

    function generateQR() {
      const joinUrl = window.location.origin + '/';
      document.getElementById('joinLink').textContent = joinUrl;
      const canvas = document.getElementById('qrCanvas');
      QRCode.toCanvas(canvas, joinUrl, { width: 120, margin: 1 }, (err) => {
        if (err) console.error('QR error', err);
      });
    }

    function copyLink() {
      const url = window.location.origin + '/';
      navigator.clipboard.writeText(url).then(() => {
        const btn = event.target;
        btn.textContent = 'Copied!';
        setTimeout(() => btn.textContent = 'Copy Link', 1500);
      });
    }

    // ── Load data ──────────────────────────────────────────────

    async function loadDashboard() {
      try {
        const res = await fetch('/api/host/dashboard', {
          headers: { 'x-host-token': hostToken },
        });
        if (res.status === 401) { logout(); return; }
        stats = await res.json();
        renderDashboard();
      } catch (e) {
        console.error('Failed to load dashboard', e);
      }
    }

    // ── Render ─────────────────────────────────────────────────

    function renderDashboard() {
      if (!stats) return;

      document.getElementById('statParticipants').textContent = stats.participantCount;
      document.getElementById('statQuestions').textContent = stats.questions.length;
      document.getElementById('statActive').textContent = stats.activeQuestionOrder;
      document.getElementById('activeUpTo').textContent = stats.activeQuestionOrder;
      document.getElementById('totalQuestions').textContent = stats.questions.length;
      document.getElementById('statusText').textContent =
        `${stats.participantCount} participants connected  ·  ${stats.activeQuestionOrder} of ${stats.questions.length} questions active`;

      const canActivate = stats.activeQuestionOrder < stats.questions.length;
      document.getElementById('activateNextBtn').disabled = !canActivate;

      renderQuestionList();
      renderResults();
    }

    function renderQuestionList() {
      const list = document.getElementById('questionList');
      if (stats.questions.length === 0) {
        list.innerHTML = '<div class="text-muted text-center" style="padding:24px">No questions yet. Add one above.</div>';
        return;
      }

      list.innerHTML = stats.questions.map((q) => {
        const isActive = q.order_num <= stats.activeQuestionOrder;
        const cls = isActive ? 'active' : (stats.activeQuestionOrder > 0 ? 'inactive' : '');
        return `
          <div class="question-item ${cls}" data-id="${q.id}">
            <div class="q-number">${q.order_num}</div>
            <div class="q-text">${escapeHtml(q.text)}</div>
            <div class="q-stats">
              <span class="q-yes">${q.stats.yes} Y</span>
              <span class="q-no">${q.stats.no} N</span>
            </div>
            <div class="q-actions">
              <button title="Move up" onclick="moveQuestion(${q.id}, -1)">&#9650;</button>
              <button title="Move down" onclick="moveQuestion(${q.id}, 1)">&#9660;</button>
              <button title="Delete" onclick="deleteQuestion(${q.id})">&#10005;</button>
            </div>
          </div>`;
      }).join('');
    }

    function renderResults() {
      const container = document.getElementById('resultsList');
      const activeQs = stats.questions.filter(q => q.order_num <= stats.activeQuestionOrder);

      if (activeQs.length === 0) {
        container.innerHTML = '<div class="text-muted text-center" style="padding:24px">Activate questions to see results here.</div>';
        return;
      }

      container.innerHTML = activeQs.map(q => {
        const s = q.stats;
        const total = s.yes + s.no;
        const yesPct = total > 0 ? Math.round((s.yes / total) * 100) : 0;
        const noPct = total > 0 ? Math.round((s.no / total) * 100) : 0;

        let majorityClass = 'tie-majority';
        if (s.majority === 'Yes') majorityClass = 'yes-majority';
        else if (s.majority === 'No') majorityClass = 'no-majority';

        return `
          <div style="margin-bottom:20px;padding:16px;border:1px solid var(--border);border-radius:var(--radius-sm)">
            <div class="flex justify-between items-center mb-8">
              <strong style="font-size:14px">Q${q.order_num}: ${escapeHtml(q.text)}</strong>
              <span class="q-majority ${majorityClass}">${s.majority}</span>
            </div>
            <div class="stats-row" style="margin-bottom:8px">
              <div class="stat-card" style="padding:10px">
                <div class="stat-value success" style="font-size:22px">${s.yes}</div>
                <div class="stat-label">Yes (${yesPct}%)</div>
              </div>
              <div class="stat-card" style="padding:10px">
                <div class="stat-value danger" style="font-size:22px">${s.no}</div>
                <div class="stat-label">No (${noPct}%)</div>
              </div>
              <div class="stat-card" style="padding:10px">
                <div class="stat-value" style="font-size:22px">${total}</div>
                <div class="stat-label">Answered</div>
              </div>
              <div class="stat-card" style="padding:10px">
                <div class="stat-value warning" style="font-size:22px">${stats.participantCount - total}</div>
                <div class="stat-label">Pending</div>
              </div>
            </div>
            <!-- Bar visualization -->
            <div style="display:flex;height:8px;border-radius:4px;overflow:hidden;background:var(--border)">
              <div style="width:${yesPct}%;background:var(--success);transition:width .3s"></div>
              <div style="width:${noPct}%;background:var(--danger);transition:width .3s"></div>
            </div>
          </div>`;
      }).join('');
    }

    // ── Actions ────────────────────────────────────────────────

    async function addQuestion() {
      const input = document.getElementById('newQuestionInput');
      const text = input.value.trim();
      if (!text) return;
      input.value = '';
      await apiFetch('/api/host/questions', 'POST', { text });
    }

    async function deleteQuestion(id) {
      if (!confirm('Delete this question and its responses?')) return;
      await apiFetch(`/api/host/questions/${id}`, 'DELETE');
    }

    async function moveQuestion(id, direction) {
      const ids = stats.questions.map(q => q.id);
      const idx = ids.indexOf(id);
      const newIdx = idx + direction;
      if (newIdx < 0 || newIdx >= ids.length) return;
      [ids[idx], ids[newIdx]] = [ids[newIdx], ids[idx]];
      await apiFetch('/api/host/questions/reorder', 'POST', { questionIds: ids });
    }

    async function activateNext() {
      const next = stats.activeQuestionOrder + 1;
      if (next > stats.questions.length) return;
      await apiFetch('/api/host/activate', 'POST', { orderNum: next });
    }

    async function resetQuiz() {
      if (!confirm('This will clear all participant responses and logins. Questions will be kept. Continue?')) return;
      await apiFetch('/api/host/reset', 'POST');
    }

    async function resetAll() {
      if (!confirm('This will delete ALL data — questions, responses, and participants. Continue?')) return;
      await apiFetch('/api/host/reset-all', 'POST');
    }

    async function apiFetch(url, method = 'GET', body = null) {
      const opts = {
        method,
        headers: { 'Content-Type': 'application/json', 'x-host-token': hostToken },
      };
      if (body) opts.body = JSON.stringify(body);
      try {
        const res = await fetch(url, opts);
        if (res.status === 401) { logout(); return; }
        return await res.json();
      } catch (e) {
        console.error('API error', e);
      }
    }

    // Enter key to add question
    document.getElementById('newQuestionInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); addQuestion(); }
    });

    // ── Real-time updates ──────────────────────────────────────

    socket.on('stats-update', (data) => {
      stats = data;
      renderDashboard();
    });

    // ── Util ───────────────────────────────────────────────────

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }
  </script>
</body>
</html>
